# .docs-linter.yml
# Configuration for docs-linter
# See: https://github.com/henrytamm/docs-linter

# File types to lint
file_types:
  - "*.md"

# Glob patterns to exclude
exclude:
  - "node_modules/**"
  - "vendor/**"
  - ".git/**"
  - ".venv/**"

# Rule configuration
rules:
  DL001:  # no-passive-voice
    enabled: true
    severity: warning
  DL002:  # no-future-tense
    enabled: true
    severity: warning
  DL003:  # no-weasel-words
    enabled: true
    severity: warning
  DL004:  # no-permissive-language
    enabled: true
    severity: warning
  DL005:  # no-doubled-words
    enabled: true
    severity: error
  DL007:  # sentence-length
    enabled: true
    severity: info
    options:
      max_words: 30
  DL008:  # heading-style
    enabled: true
    severity: warning
  DL010:  # no-placeholder-text
    enabled: true
    severity: error
  DL011:  # no-first-person
    enabled: true
    severity: warning
  DL012:  # no-click-here
    enabled: true
    severity: warning

# Minimum severity to exit non-zero (for CI)
fail_on: warning
